# GOATGuard App — CD: Build APK debug
# Solo se ejecuta en push a main.
#
# Secrets requeridos (Settings → Secrets → Actions):
#   API_BASE_URL           — URL del backend
#   GOOGLE_SERVICES_JSON   — google-services.json en base64

name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Setup google-services.json
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_B64" ]; then
            echo "$GOOGLE_SERVICES_B64" | base64 --decode > android/app/google-services.json
          else
            echo "⚠️  GOOGLE_SERVICES_JSON no configurado — placeholder para CI"
            cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "goatguard-placeholder",
              "storage_bucket": "goatguard-placeholder.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "com.goatguard.goatguard_app" }
              },
              "api_key": [{ "current_key": "placeholder-key-for-ci-only" }]
            }],
            "configuration_version": "1"
          }
          EOF
          fi

      - name: Build APK (debug)
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: goatguard-debug-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
